name: build proofs

# For CI / Quality Gatekeeper (formerly CI Cara): see docs/HELP.md + docs/READING-GUIDE.md (Quality Gatekeeper card)
# for the full path. The registries and scripts/check_* are the core.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Opt into Node.js 24 for JavaScript actions (actions/checkout,
# docker/* actions etc.).  GitHub Actions deprecated the Node.js 20
# runtime on 2025-09-19 and forces Node.js 24 as the default on
# 2026-06-02; setting this flag now silences the transitional
# deprecation warning and verifies the workflow runs cleanly on the
# new runtime before the cutover.  See
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rocq:
    name: Build with Rocq ${{ matrix.rocq-version }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        rocq-version: ['9.1.1']
    steps:
      - uses: actions/checkout@v6

      - name: Install Rocq via Homebrew
        # Bottled install ~30s; caching the Cellar misses Homebrew's
        # config files under /opt/homebrew/etc/, which breaks ocamlfind.
        # Easier to install fresh each run.
        run: brew install rocq

      - name: Show Rocq version
        run: rocq -v

      - name: Generate Makefile
        run: coq_makefile -f _CoqProject -o Makefile

      - name: Build proofs
        # Parallel across the runner's cores.  Apple's bundled GNU make
        # 3.81 supports -j (it predates --output-sync, but nothing here
        # parses this job's build log, so interleaving is harmless --
        # the axiom audit runs on the container job's synced log).
        run: make -j"$(sysctl -n hw.ncpu)"

      - name: Verify no .v file is missing a Qed (two-tier Admitted check)
        # Scans BOTH theories/ and theories-flocq/.  The directory split
        # is about which CI runner builds the file (host vs container),
        # not about which proof standard it meets.  Same rule applies.
        #
        # TWO-TIER SYSTEM (May 2026):
        #
        # Tier 1 (standard): Admitted without registry entry -> BUILD FAILURE.
        #   The default rule.  Every Admitted that isn't in the
        #   counterexample registry fails CI.
        #
        # Tier 2 (counterexample): Admitted with registry entry in
        #   docs/admitted-counterexamples.txt referencing a verified
        #   counterexample -> ALLOWED, tracked.
        #
        # This catches the proxy-vs-precision drift the old grep had:
        # "no Admitted" was really "no unverified gaps."  The registry
        # makes the rule precise: "no gaps that haven't been
        # characterized with a verified counterexample."
        #
        # Axiom / Parameter / admit. remain BANNED outright -- the
        # registry covers Admitted theorems only.
        #
        # The script anchors each banned keyword to the start of a
        # line (modulo whitespace) so prose mentions in comments don't
        # trip the check.  `admit.` keeps word-boundary form because
        # it appears mid-line as a tactic.
        run: bash scripts/check_admitted.sh

      - name: README <-> allowlist consistency (guardrail 3)
        # Verifies the README's prose claim about "the three standard
        # axioms" matches docs/axiom-allowlist.txt verbatim.  Catches
        # silent drift of either source from the other.  See
        # scripts/check_readme_axioms.sh for the exact check.
        run: bash scripts/check_readme_axioms.sh

      - name: verified-claims.md references exist (guardrail 5)
        # Keeps docs/verified-claims.md honest: every `Module.v : theorem`
        # it cites must resolve to a real definition in theories/ or
        # theories-flocq/.  A rename/removal that orphans a claim fails
        # here instead of silently rotting.  Grep-only (no build needed).
        run: bash scripts/validate-claims.sh

      - name: Oracle hand-roll ratchet (guardrail 6)
        # The RocqRefRunner is credible only if every mode is bit-exact
        # against a Coq-EXTRACTED reference.  This ratchet freezes the
        # existing hand-rolled float kernels in oracle/driver.ml
        # (docs/oracle-handrolled-allowlist.txt) so the set can only
        # shrink: a new hand-rolled mode, or a stale allowlist entry left
        # after a migration, fails here.  Backlog for shrinking it:
        # docs/oracle-handroll-migration.md.  perl/awk-only (no build).
        run: bash scripts/check_oracle_handrolled.sh

  rocq-flocq:
    # Container-based build of the Flocq-dependent corpus
    # (`theories-flocq/`).  The host-runner `rocq` job above only builds
    # `theories/` -- it grep-scans `theories-flocq/` for the corpus
    # invariant but does not compile those files.  This job closes that
    # gap by running the project's pinned Dockerfile end-to-end, which
    # uses `rocq/rocq-prover:9.1.1-ocaml-4.14.2-flambda` + opam-installed
    # `coq-flocq.4.2.2` to build the full `_CoqProject.full` corpus.
    #
    # A single clean parallel build (with `--output-sync=target`) serves
    # both purposes at once: compile validation AND the per-file log the
    # axiom audit needs.  If any `.v` file fails to compile, the build
    # step exits non-zero and the job fails.
    name: Build theories-flocq in pinned container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image with Flocq corpus
        # `--load` so the resulting image is available to the local
        # docker daemon for the next step's `docker run`.  Cache the
        # build via the GitHub Actions runner cache so the slow
        # `opam install coq-flocq.4.2.2` step (~5 min) is reused on
        # subsequent runs.
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: nts-proofs-flocq:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compile theories-flocq + per-theorem axiom audit (guardrails 1 + 4)
        # ONE clean parallel build of the full corpus, run with GNU
        # make's `--output-sync=target` so each target's entire recipe
        # output -- the `ROCQ compile <file>` line plus that file's
        # `Print Assumptions` blocks -- is emitted atomically.  This is
        # the property `scripts/audit_axioms.sh` actually needs:
        # per-FILE contiguity, not global sequential order.
        #
        # History: plain parallel attribution proved unreliable during
        # the May 2026 axiom-leak investigation (interleaved -j2
        # output), so CI used to build the corpus TWICE -- once via the
        # Dockerfile CMD for compile validation and once from clean at
        # -j1 for the audit log.  `--output-sync=target` removes the
        # interleaving at the root, so a single -j$(nproc) build now
        # serves both guardrails.
        #
        # The audit script enforces docs/axiom-allowlist.txt against
        # every per-theorem PA block, with file-level exemptions from
        # docs/audit-exceptions.txt.  Failure mode: any non-exempt file
        # has a PA block containing an axiom outside the allowlist.
        run: |
          docker run --rm \
            nts-proofs-flocq:ci \
            bash -lc '
              rm -f Makefile.gen Makefile.gen.conf .Makefile.d .Makefile.gen.d \
                    .nra.cache theories/*.vo* theories/*.glob theories/.*.aux \
                    theories-flocq/*.vo* theories-flocq/*.glob \
                    theories-flocq/.*.aux
              rocq makefile -f _CoqProject.full -o Makefile.gen
              make -f Makefile.gen -j"$(nproc)" --output-sync=target
            ' > /tmp/build_sync.log 2>&1 || {
              echo "::error::Corpus build failed; see /tmp/build_sync.log"
              tail -50 /tmp/build_sync.log
              exit 1
            }
          bash scripts/audit_axioms.sh /tmp/build_sync.log
