name: build proofs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLOCQ_IMAGE: nts-proofs-flocq:ci

jobs:
  rocq:
    name: Build with Rocq ${{ matrix.rocq-version }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        rocq-version: ['9.1.1']
    steps:
      - uses: actions/checkout@v6

      - name: Install Rocq via Homebrew
        # Bottled install ~30s; caching the Cellar misses Homebrew's
        # config files under /opt/homebrew/etc/, which breaks ocamlfind.
        # Easier to install fresh each run.
        run: brew install rocq

      - name: Show Rocq version
        run: rocq -v

      - name: Generate Makefile
        run: coq_makefile -f _CoqProject -o Makefile

      - name: Build proofs
        run: make

      - name: Verify no .v file is missing a Qed (no Admitted, no Axiom, no Parameter)
        # Scans BOTH theories/ and theories-flocq/.  The directory split
        # is about which CI runner builds the file (host vs container),
        # not about which proof standard it meets.  Same Qed-closed rule
        # applies uniformly.
        #
        # The regex anchors each keyword to the start of a line (modulo
        # leading whitespace) so prose mentions in comments like
        # "No Admitted, no Axiom" do not trip the check -- only actual
        # Rocq proof-script keywords do.  `admit.` keeps its word-boundary
        # form because it appears mid-line as a tactic.
        run: |
          if grep -nE '^[[:space:]]*Admitted[[:space:]]*\.|^[[:space:]]*Axiom\b|^[[:space:]]*Parameter\b|\badmit\.' theories/*.v theories-flocq/*.v; then
            echo "::error::Found unsoundness markers. The repo's invariant is that every proof terminates with Qed in BOTH theories/ and theories-flocq/."
            exit 1
          fi
          echo "All theorems Qed-closed."

      - name: README <-> allowlist consistency (guardrail 3)
        # Verifies the README's prose claim about "the three standard
        # axioms" matches docs/axiom-allowlist.txt verbatim.  Catches
        # silent drift of either source from the other.  See
        # scripts/check_readme_axioms.sh for the exact check.
        run: bash scripts/check_readme_axioms.sh

  rocq-flocq:
    # Container-based build of the Flocq-dependent corpus
    # (`theories-flocq/`).  The host-runner `rocq` job above only builds
    # `theories/` -- it grep-scans `theories-flocq/` for the corpus
    # invariant but does not compile those files.  This job closes that
    # gap by running the project's pinned Dockerfile end-to-end, which
    # uses `rocq/rocq-prover:9.1.1-ocaml-4.14.2-flambda` + opam-installed
    # `coq-flocq.4.2.2` to build the full `_CoqProject.full` corpus.
    #
    # The Dockerfile's CMD does a clean-and-build using
    # `_CoqProject.full`; if any `.v` file fails to compile, the
    # container exits non-zero and this step fails.
    name: Build theories-flocq in pinned container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image with Flocq corpus
        # `--load` so the resulting image is available to the local
        # docker daemon for the next step's `docker run`.  Cache the
        # build via the GitHub Actions runner cache so the slow
        # `opam install coq-flocq.4.2.2` step (~5 min) is reused on
        # subsequent runs.
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.FLOCQ_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compile theories-flocq inside container
        # Runs the Dockerfile's CMD: cleans host-leaked Makefile
        # artefacts, regenerates the Rocq makefile from
        # `_CoqProject.full`, then `make`s the entire corpus including
        # all Flocq-dependent modules.  Failure here = a `.v` file in
        # theories-flocq/ does not compile.
        run: docker run --rm "$FLOCQ_IMAGE"

      - name: Sequential build + per-theorem axiom audit (guardrails 1 + 4)
        # Re-builds the full corpus inside the same container with -j1
        # (sequential) so that `ROCQ compile <file>` lines and their
        # subsequent `Print Assumptions` output blocks are not
        # interleaved by parallel make.  Parallel attribution proved
        # unreliable during the May 2026 axiom-leak investigation; the
        # -j1 build is the load-bearing prerequisite for accurate
        # per-file violation reporting in `scripts/audit_axioms.sh`.
        #
        # The script enforces docs/axiom-allowlist.txt against every
        # per-theorem PA block, with file-level exemptions from
        # docs/audit-exceptions.txt.  Failure mode: any non-exempt file
        # has a PA block containing an axiom outside the allowlist.
        run: |
          docker run --rm \
            "$FLOCQ_IMAGE" \
            bash -lc '
              rm -f Makefile.gen Makefile.gen.conf .Makefile.d .Makefile.gen.d \
                    .nra.cache theories/*.vo* theories/*.glob theories/.*.aux \
                    theories-flocq/*.vo* theories-flocq/*.glob \
                    theories-flocq/.*.aux
              rocq makefile -f _CoqProject.full -o Makefile.gen
              make -f Makefile.gen -j1
            ' > /tmp/build_seq.log 2>&1 || {
              echo "::error::Sequential build failed; see /tmp/build_seq.log"
              tail -50 /tmp/build_seq.log
              exit 1
            }
          bash scripts/audit_axioms.sh /tmp/build_seq.log
