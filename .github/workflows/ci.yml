name: build proofs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rocq:
    name: Build with Rocq ${{ matrix.rocq-version }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        rocq-version: ['9.1.1']
    steps:
      - uses: actions/checkout@v6

      - name: Install Rocq via Homebrew
        # Bottled install ~30s; caching the Cellar misses Homebrew's
        # config files under /opt/homebrew/etc/, which breaks ocamlfind.
        # Easier to install fresh each run.
        run: brew install rocq

      - name: Show Rocq version
        run: rocq -v

      - name: Generate Makefile
        run: coq_makefile -f _CoqProject -o Makefile

      - name: Build proofs
        run: make

      - name: Verify no .v file is missing a Qed (no Admitted, no Axiom, no Parameter)
        # Scans BOTH theories/ and theories-flocq/.  The directory split
        # is about which CI runner builds the file (host vs container),
        # not about which proof standard it meets.  Same Qed-closed rule
        # applies uniformly.
        run: |
          if grep -nE 'Admitted|^\s*Axiom\b|^\s*Parameter\b|admit\.' theories/*.v theories-flocq/*.v; then
            echo "::error::Found unsoundness markers. The repo's invariant is that every proof terminates with Qed in BOTH theories/ and theories-flocq/."
            exit 1
          fi
          echo "All theorems Qed-closed."
